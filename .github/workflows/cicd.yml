name: CI-CD

on:
  push:
    branches:
      - main

jobs:

  build-and-scan:

    runs-on: ubuntu-latest

    steps:

    - name: Checkout
      uses: actions/checkout@v4

    - name: Docker Login
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Build Image
      run: |
        docker build -t nandheeswaran/devops-backend:${{ github.sha }} ./app/backend

    - name: Install Trivy
      run: |
        sudo apt-get update
        sudo apt-get install wget apt-transport-https gnupg lsb-release -y
        wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key | sudo apt-key add -
        echo "deb https://aquasecurity.github.io/trivy-repo/deb generic main" | sudo tee /etc/apt/sources.list.d/trivy.list
        sudo apt-get update
        sudo apt-get install trivy -y

    - name: Run Trivy Scan
      run: |
        trivy image --exit-code 0 --severity HIGH,CRITICAL nandheeswaran/devops-backend:${{ github.sha }}

    - name: Push Image
      run: |
        docker push nandheeswaran/devops-backend:${{ github.sha }}
